@if (result) {
  <div class="phase-clear-card">
    <h2>Fase Concluída</h2>
    <h3>{{ result.phaseTitle }}</h3>

    <div class="row">
      <span>Pontos</span>
      <strong>{{ result.score }}</strong>
    </div>

    <div class="row">
      <span>Moedas</span>
      <strong>{{ result.coins }}</strong>
    </div>

    <div class="row">
      <span>Centelhas</span>
      <strong>{{ result.sparks }}</strong>
    </div>

    <div class="row">
      <span>Bônus de vida</span>
      <strong>{{ result.bonusHp }}</strong>
    </div>

    <div class="row total">
      <span>Total</span>
      <strong>{{ result.totalScore }}</strong>
    </div>
  </div>
}
