@if (result) {
  <div class="phase-clear-card">
    <p class="overline">Fase concluída</p>
    <h2>{{ result.phaseTitle }}</h2>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="label">Tempo</span>
        <strong>{{ result.formattedTime }}</strong>
      </div>

      <div class="stat-card">
        <span class="label">Pontos</span>
        <strong>{{ result.score }}</strong>
      </div>

      <div class="stat-card">
        <span class="label">Moedas</span>
        <strong>{{ result.coins }}</strong>
      </div>

      <div class="stat-card">
        <span class="label">Centelhas</span>
        <strong>{{ result.sparks }}</strong>
      </div>

      <div class="stat-card">
        <span class="label">Bônus de vida</span>
        <strong>{{ result.bonusHp }}</strong>
      </div>

      <div class="stat-card total">
        <span class="label">Total</span>
        <strong>{{ result.totalScore }}</strong>
      </div>
    </div>
  </div>
}
