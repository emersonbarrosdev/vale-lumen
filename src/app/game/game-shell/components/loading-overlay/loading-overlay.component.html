<ng-container *ngIf="state$ | async as state">
  <div *ngIf="state.visible" class="loading-overlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <h2>{{ state.title }}</h2>
      <p>{{ state.subtitle }}</p>
      <small>{{ state.progressText }}</small>
    </div>
  </div>
</ng-container>
