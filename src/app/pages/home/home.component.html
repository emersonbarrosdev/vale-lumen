<div class="home-screen">
  <div class="mist mist-back"></div>
  <div class="mist mist-front"></div>
  <div class="embers"></div>

  <div class="far-background">
    <div class="moon-glow"></div>
    <div class="mountains layer-1"></div>
    <div class="mountains layer-2"></div>
    <div class="ruins ruins-left">
      <span class="tower"></span>
      <span class="house"></span>
      <span class="house small"></span>
    </div>
    <div class="ruins ruins-right">
      <span class="tower broken"></span>
      <span class="house"></span>
    </div>
    <div class="dead-tree tree-left"></div>
    <div class="dead-tree tree-right"></div>
  </div>

  <div class="content">
    <button
      class="gear-button"
      type="button"
      aria-label="Abrir opções"
      (click)="toggleOptions()"
    >
      ⚙
    </button>

    <div class="brand-block">
      <p class="overline">A jornada começa entre cinzas e memória</p>

      <h1 class="title" aria-label="As Cinzas do Vale">
        <span class="title-line">AS CINZAS DO VALE</span>
      </h1>

      <p class="subtitle">
        O Coração caiu. O vale apodreceu. Ainda resta uma chama.
      </p>

      <button class="press-start" type="button" (click)="startGame()">
        Press Start
      </button>
    </div>
  </div>

  <div class="options-overlay" *ngIf="optionsOpen">
    <div class="options-panel">
      <button
        class="options-close"
        type="button"
        aria-label="Fechar opções"
        data-options-item="true"
        (click)="closeOptions()"
      >
        ×
      </button>

      <div class="options-title">Opções</div>

      <div class="options-actions">
        <button
          class="menu-btn primary"
          type="button"
          data-options-item="true"
          (click)="startGame()"
        >
          <span class="btn-glow"></span>
          <span>Iniciar</span>
        </button>

        <button
          class="menu-btn"
          type="button"
          data-options-item="true"
          (click)="goToSettings()"
        >
          <span class="btn-glow"></span>
          <span>Configurações</span>
        </button>

        <button
          class="menu-btn"
          type="button"
          data-options-item="true"
          (click)="goToCredits()"
        >
          <span class="btn-glow"></span>
          <span>Créditos</span>
        </button>

        <button
          class="menu-btn danger"
          type="button"
          data-options-item="true"
          (click)="restartGame()"
        >
          <span class="btn-glow"></span>
          <span>Reiniciar</span>
        </button>
      </div>
    </div>
  </div>
</div>
